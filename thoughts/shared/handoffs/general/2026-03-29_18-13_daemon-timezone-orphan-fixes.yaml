decisions:
  - db_clock_for_staleness: Use PostgreSQL NOW() - INTERVAL instead of Python datetime.now() to avoid timezone mismatch between daemon process and DB
  - popen_poll_over_waitpid: Popen.poll() handles reaping internally; os.waitpid() is fragile when multiple children finish between poll intervals

findings:
  - orphan_pattern: In batches of 4 concurrent extractions, only the first to finish gets reaped by waitpid(); the other 3 are auto-reaped by OS before next poll, causing ChildProcessError
  - timezone_offset: PostgreSQL container uses UTC; Python daemon uses local time (CDT, UTC-5). Sessions appeared "not stale yet" for ~5 extra hours
  - session_3d91cf69: User's session with JSONL 3d91cf69-a4a7-45ec-8427-9866c4535809 was among the permanently failed due to orphan bug; reset and should now extract successfully

